    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const cart = JSON.parse(sessionStorage.getItem("checkout")) ||
                JSON.parse(localStorage.getItem("cart")) || [];

            const orderItems = document.getElementById("orderItems");
            const orderTotal = document.getElementById("orderTotal");
            const cardFields = document.getElementById("cardFields");

            let total = 0;
            orderItems.innerHTML = "";

            if (cart.length === 0) {
                orderItems.innerHTML = "<p>No product selected</p>";
                orderTotal.innerText = "Rs 0";
                return;
            }

            // Show cart summary
            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;

                orderItems.innerHTML += `
            <div class="order-item">
                <strong>${item.name}</strong><br>
                Color: ${item.color || "—"} | Size: ${item.size || "—"} | Qty: ${item.qty}<br>
                Rs ${itemTotal}
            </div>
        `;
            });

            orderTotal.innerText = "Rs " + total;

            // Place order
            document.getElementById("placeOrderBtn").addEventListener("click", async () => {
                const email = document.getElementById("email").value.trim();
                const name = document.getElementById("name").value.trim();
                const address = document.getElementById("address").value.trim();
                const apartment = document.getElementById("apartment").value.trim();
                const phone = document.getElementById("phone").value.trim();

                if (!email || !name || !address || !phone) {
                    alert("Please fill all required fields");
                    return;
                }

                const paymentMethod = document.querySelector('input[name="payment"]:checked')?.value || "cod";

                let transactionId = "";
                if (paymentMethod === "card") {
                    transactionId = document.querySelector("#cardFields input[placeholder='Transaction ID']")?.value || "";
                    if (!transactionId) {
                        alert("Please enter Transaction ID");
                        return;
                    }
                }

                const orderData = {
                    customer: { name, email, address, apartment, phone },
                    items: cart.map(item => ({
                        name: item.name,
                        price: item.price,
                        qty: item.qty,
                        size: item.size || "",
                        color: item.color || ""
                    })),
                    total,
                    payment: {
                        method: paymentMethod === "card" ? "Online Transfer" : "Cash on Delivery",
                        transactionId: transactionId || null
                    },
                    orderDate: new Date().toISOString()
                };

                try {
                    const res = await fetch("/order", {  // <-- localhost:3000 hata diya
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(orderData)
                    });

                    const data = await res.json();

                    if (data.success) {
                        alert("Order placed successfully!");
                        localStorage.removeItem("cart");
                        sessionStorage.removeItem("checkout");
                        window.location.href = "index.html"; // redirect
                    } else {
                        alert("Order failed! " + (data.message || ""));
                    }

                } catch (err) {
                    console.error(err);
                    alert("Server error. Make sure Node.js server is running.");
                }
            });

        });
    </script>
</body>

</html>
